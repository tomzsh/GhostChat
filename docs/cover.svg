<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="GhostChat — Anonymous Ephemeral E2EE Chat">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="55%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1a12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#33ff66" stop-opacity="0"/>
      <stop offset="50%" stop-color="#33ff66" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#33ff66" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#33ff66" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Soft green radial accents -->
  <circle cx="200" cy="120" r="220" fill="#33ff66" opacity="0.04"/>
  <circle cx="1100" cy="520" r="260" fill="#33ff66" opacity="0.05"/>
  <rect x="0" y="300" width="1280" height="2" fill="url(#glow)"/>

  <!-- Terminal window -->
  <g transform="translate(160, 90)">
    <rect x="0" y="0" width="960" height="460" rx="12" fill="#111111" stroke="#222222" stroke-width="2"
          filter="url(#softGlow)"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="960" height="48" rx="12" fill="#0d0d0d"/>
    <rect x="0" y="24" width="960" height="24" fill="#0d0d0d"/>
    <circle cx="32" cy="24" r="7" fill="#ff4466" opacity="0.9"/>
    <circle cx="56" cy="24" r="7" fill="#fbbf24" opacity="0.9"/>
    <circle cx="80" cy="24" r="7" fill="#33ff66" opacity="0.9"/>
    <text x="480" y="29" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="14" fill="#6b7280" letter-spacing="3">GHOSTCHAT · V1.0</text>

    <!-- Content -->
    <text x="48" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="18" fill="#33ff66">$ ghostchat</text>

    <text x="48" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="56" font-weight="700" fill="#ffffff" filter="url(#titleGlow)" letter-spacing="-1">GhostChat</text>

    <text x="48" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="22" fill="#33ff66" letter-spacing="1">Anonymous. Encrypted. Gone.</text>

    <text x="48" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="16" fill="#6b7280">1:1 ephemeral E2EE chat · no accounts · no history</text>

    <!-- Feature chips -->
    <g transform="translate(48, 310)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
      <rect x="0" y="0" width="150" height="36" rx="4" fill="#0a0a0a" stroke="#33ff66" stroke-opacity="0.45"/>
      <text x="75" y="23" text-anchor="middle" fill="#33ff66">X25519 · AEAD</text>

      <rect x="166" y="0" width="130" height="36" rx="4" fill="#0a0a0a" stroke="#222"/>
      <text x="231" y="23" text-anchor="middle" fill="#9ca3af">Web + CLI</text>

      <rect x="312" y="0" width="160" height="36" rx="4" fill="#0a0a0a" stroke="#222"/>
      <text x="392" y="23" text-anchor="middle" fill="#9ca3af">Zero-knowledge</text>

      <rect x="488" y="0" width="140" height="36" rx="4" fill="#0a0a0a" stroke="#222"/>
      <text x="558" y="23" text-anchor="middle" fill="#9ca3af">Self-destruct</text>
    </g>

    <!-- Stick figures -->
    <g transform="translate(720, 300)" fill="none" stroke="#33ff66" stroke-width="2" opacity="0.85"
       font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <!-- left -->
      <circle cx="40" cy="28" r="16" stroke="#33ff66"/>
      <text x="40" y="33" text-anchor="middle" font-size="11" fill="#33ff66" stroke="none">o_o</text>
      <path d="M40 44 L40 78 M40 55 L22 68 M40 55 L58 68 M40 78 L28 100 M40 78 L52 100"/>
      <!-- wave -->
      <text x="95" y="55" font-size="14" fill="#33ff66" stroke="none" opacity="0.7">~~~~</text>
      <!-- right -->
      <circle cx="160" cy="28" r="16" stroke="#33ff66"/>
      <text x="160" y="33" text-anchor="middle" font-size="11" fill="#33ff66" stroke="none">^_^</text>
      <path d="M160 44 L160 78 M160 55 L142 68 M160 55 L178 68 M160 78 L148 100 M160 78 L172 100"/>
    </g>

    <!-- Cursor blink bar -->
    <rect x="48" y="400" width="12" height="22" fill="#33ff66" opacity="0.85"/>
    <text x="70" y="417" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="14" fill="#6b7280">talk once. leave nothing.</text>
  </g>

  <!-- Bottom brand strip -->
  <text x="640" y="600" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="13" fill="#4b5563" letter-spacing="2">github.com/tomzsh/ghostchat</text>
</svg>
