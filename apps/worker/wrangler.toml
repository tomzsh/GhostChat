name = "ghostchat"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Bind all interfaces so browsers resolving localhost → ::1 still connect
[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["RoomDurableObject"]

[vars]
# Optional docs / operators. Create API returns path-only `wsPath`.
# Production: set via dashboard or --var to your public relay
# (custom domain recommended, e.g. wss://relay.example.com).
PUBLIC_WS_ORIGIN = "ws://127.0.0.1:8787"
# Comma-separated browser origins for CORS (empty = GhostChat + localhost list)
# ALLOWED_ORIGINS = "https://ghostchat-web-two.vercel.app,http://127.0.0.1:3000"
